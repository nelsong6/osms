apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: grafana
spec:
  hostnames:
    - grafana.romaine.life
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: grafana
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: grafana-oauth2-proxy
          port: 4180
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
